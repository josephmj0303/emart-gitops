apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-monitoring-kube-prometheus-alertmanager
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: slack-notifications

    receivers:
      - name: slack-notifications
        slack_configs:
          - api_url: http://alertmanager-slack-webhook.monitoring.svc.cluster.local/webhook
            channel: "#alerts"
            send_resolved: true
